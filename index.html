<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Artemis — Diseñá tu producto</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">

<style>
:root {
  /* Artemis brand */
  --pink-50:  #FFF0F6;
  --pink-100: #FFD6E8;
  --pink-200: #FFB3D1;
  --pink-400: #F472B6;
  --pink-500: #EC4899;
  --pink-600: #DB2777;
  --pink-700: #BE185D;
  --pink-800: #9D174D;
  --red-hex:  #C0392B;
  --red-light:#FFE8E6;

  --white: #ffffff;
  --gray-50:  #FDF8FA;
  --gray-100: #F5EEF2;
  --gray-200: #E8D8E2;
  --gray-300: #CDB5C5;
  --gray-400: #A98899;
  --gray-600: #7A5C6B;
  --gray-800: #3D2535;
  --gray-900: #2A1420;

  --text-primary:   #2A1420;
  --text-secondary: #7A5C6B;
  --text-muted:     #A98899;
  --border:         rgba(219,39,119,0.12);
  --border-strong:  rgba(219,39,119,0.22);
  --bg-main:        #FDF8FA;

  --radius-sm:  6px;
  --radius-md:  10px;
  --radius-lg:  16px;
  --radius-xl:  22px;
  --shadow-sm:  0 1px 4px rgba(219,39,119,0.07);
  --shadow-md:  0 4px 18px rgba(219,39,119,0.10);
  --shadow-lg:  0 8px 36px rgba(219,39,119,0.13);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Nunito', sans-serif;
  background: var(--bg-main);
  color: var(--text-primary);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ══════════════════════════════
   TOPBAR
══════════════════════════════ */
.topbar {
  height: 58px;
  background: var(--white);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
  flex-shrink: 0;
  position: relative;
  z-index: 200;
  box-shadow: var(--shadow-sm);
}

/* Logo hexagonal */
.logo { display: flex; align-items: center; gap: 11px; text-decoration: none; }
.logo-hex {
  width: 36px; height: 36px;
  background: var(--red-hex);
  clip-path: polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.logo-hex svg { width: 16px; height: 16px; fill: white; }
.logo-name {
  font-family: 'Playfair Display', serif;
  font-size: 18px;
  color: var(--text-primary);
  letter-spacing: 0.02em;
  line-height: 1;
}
.logo-sub {
  font-size: 9px;
  font-weight: 600;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--pink-500);
  margin-top: 2px;
}

/* Steps */
.steps {
  position: absolute; left: 50%; transform: translateX(-50%);
  display: flex; align-items: center; gap: 0;
}
.step {
  display: flex; align-items: center; gap: 6px;
  padding: 6px 14px; border-radius: 50px;
  font-size: 12px; font-weight: 600;
  color: var(--text-muted); cursor: default; transition: all 0.2s;
}
.step.done { color: var(--pink-600); }
.step.active { background: var(--pink-50); color: var(--pink-700); }
.step-num {
  width: 20px; height: 20px; border-radius: 50%;
  border: 2px solid currentColor;
  display: flex; align-items: center; justify-content: center;
  font-size: 9px; font-weight: 800; flex-shrink: 0;
}
.step.done .step-num { background: var(--pink-600); border-color: var(--pink-600); color: white; }
.step-sep { color: var(--gray-300); font-size: 11px; padding: 0 2px; }

.topbar-right { display: flex; align-items: center; gap: 8px; }
.badge {
  display: flex; align-items: center; gap: 5px;
  background: var(--pink-50); color: var(--pink-700);
  border: 1px solid var(--pink-100);
  padding: 5px 12px; border-radius: 50px;
  font-size: 11px; font-weight: 700;
}

/* ══════════════════════════════
   WORKSPACE
══════════════════════════════ */
.workspace {
  display: flex;
  flex: 1;
  height: calc(100vh - 58px);
  overflow: hidden;
}

/* ══════════════════════════════
   SIDEBAR IZQ
══════════════════════════════ */
.sidebar-left {
  width: 235px; flex-shrink: 0;
  background: var(--white);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  overflow: hidden;
}
.sb-scroll {
  flex: 1; overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: var(--pink-200) transparent;
}
.sb-scroll::-webkit-scrollbar { width: 3px; }
.sb-scroll::-webkit-scrollbar-thumb { background: var(--pink-200); border-radius: 3px; }

.sb-sec { padding: 14px 14px 12px; border-bottom: 1px solid var(--border); }
.sb-lbl {
  font-size: 9px; font-weight: 800;
  letter-spacing: 0.11em; text-transform: uppercase;
  color: var(--text-muted); margin-bottom: 10px;
}

/* Producto grid */
.prod-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; }
.prod-card {
  border: 2px solid var(--border);
  border-radius: var(--radius-md);
  padding: 8px 4px 7px;
  cursor: pointer; text-align: center;
  transition: all 0.17s; background: var(--white);
  user-select: none;
}
.prod-card:hover { border-color: var(--pink-400); background: var(--pink-50); }
.prod-card.sel { border-color: var(--pink-600); background: var(--pink-50); }
.prod-card i { font-size: 22px; color: var(--gray-400); display: block; margin-bottom: 4px; transition: color 0.17s; }
.prod-card:hover i, .prod-card.sel i { color: var(--pink-600); }
.prod-card span { font-size: 9px; font-weight: 700; color: var(--text-secondary); letter-spacing: 0.03em; }
.prod-card.sel span { color: var(--pink-700); }

/* Tools */
.tool-list { display: flex; flex-direction: column; gap: 2px; }
.tool-btn {
  display: flex; align-items: center; gap: 9px;
  padding: 9px 11px; border-radius: var(--radius-md);
  border: none; background: transparent;
  cursor: pointer; font-family: 'Nunito', sans-serif;
  font-size: 13px; font-weight: 600;
  color: var(--text-secondary); width: 100%; text-align: left;
  transition: all 0.15s;
}
.tool-btn:hover { background: var(--gray-100); color: var(--text-primary); }
.tool-btn.active { background: var(--pink-50); color: var(--pink-700); }
.tool-btn .tb-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--pink-500); opacity: 0;
  margin-left: auto; transition: opacity 0.15s;
}
.tool-btn.active .tb-dot { opacity: 1; }
.tool-btn i { font-size: 17px; flex-shrink: 0; }

/* Tool content */
.upload-zone {
  border: 2px dashed var(--pink-200);
  border-radius: var(--radius-md);
  padding: 20px 12px; text-align: center;
  cursor: pointer; transition: all 0.18s;
}
.upload-zone:hover { border-color: var(--pink-500); background: var(--pink-50); }
.upload-zone i { font-size: 28px; color: var(--pink-400); display: block; margin-bottom: 8px; }
.upload-zone .uz-t { font-size: 12px; font-weight: 700; color: var(--text-secondary); margin-bottom: 3px; }
.upload-zone .uz-s { font-size: 10px; color: var(--text-muted); }
.upload-hint { font-size: 10px; color: var(--text-muted); margin-top: 8px; text-align: center; }

/* Stickers */
.sticker-cats { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 10px; }
.scat {
  padding: 3px 9px; border-radius: 50px;
  border: 1.5px solid var(--border-strong);
  font-size: 10px; font-weight: 700; cursor: pointer;
  background: transparent; color: var(--text-secondary);
  font-family: 'Nunito', sans-serif; transition: all 0.14s;
}
.scat.active { background: var(--pink-600); color: white; border-color: var(--pink-600); }
.sticker-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; }
.stkr {
  aspect-ratio: 1; border: 2px solid transparent;
  border-radius: var(--radius-sm); background: var(--gray-50);
  cursor: pointer; font-size: 20px;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.14s; user-select: none;
}
.stkr:hover { background: var(--pink-50); border-color: var(--pink-300,#f9a8d4); transform: scale(1.13); }

/* Templates */
.tpl-list { display: flex; flex-direction: column; gap: 6px; }
.tpl-item {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 10px; border: 2px solid var(--border);
  border-radius: var(--radius-md); cursor: pointer; transition: all 0.15s;
}
.tpl-item:hover { border-color: var(--pink-400); background: var(--pink-50); }
.tpl-thumb {
  width: 36px; height: 36px; border-radius: var(--radius-sm);
  background: var(--pink-50); display: flex; align-items: center;
  justify-content: center; font-size: 18px; flex-shrink: 0;
}
.tpl-name { font-size: 12px; font-weight: 700; color: var(--text-primary); }
.tpl-desc { font-size: 10px; color: var(--text-muted); }

/* Filters */
.flt-list { display: flex; flex-direction: column; gap: 4px; }
.flt-item {
  display: flex; align-items: center; gap: 10px;
  padding: 7px 10px; border-radius: var(--radius-md);
  border: 2px solid var(--border); cursor: pointer;
  font-family: 'Nunito', sans-serif; font-size: 12px; font-weight: 600;
  color: var(--text-secondary); background: transparent; text-align: left;
  transition: all 0.14s;
}
.flt-item.active { background: var(--pink-50); color: var(--pink-700); border-color: var(--pink-300,#f9a8d4); }
.flt-item:hover:not(.active) { background: var(--gray-50); }
.flt-sw { width: 24px; height: 24px; border-radius: 5px; flex-shrink: 0; border: 1px solid rgba(0,0,0,0.08); }

/* Texto */
.txt-row { display: flex; gap: 6px; margin-bottom: 10px; }
.txt-row input {
  flex: 1; padding: 8px 10px; border-radius: var(--radius-md);
  border: 2px solid var(--border-strong); font-family: 'Nunito', sans-serif;
  font-size: 12px; font-weight: 600; color: var(--text-primary);
  background: var(--white); outline: none; transition: border-color 0.15s;
}
.txt-row input:focus { border-color: var(--pink-500); }
.txt-row button {
  padding: 8px 13px; border-radius: var(--radius-md); border: none;
  background: var(--pink-600); color: white; font-family: 'Nunito', sans-serif;
  font-size: 13px; font-weight: 800; cursor: pointer; transition: background 0.14s;
}
.txt-row button:hover { background: var(--pink-700); }
.font-list { display: flex; flex-direction: column; gap: 4px; }
.font-item {
  padding: 7px 10px; border-radius: var(--radius-md);
  border: 2px solid var(--border); cursor: pointer;
  font-size: 12px; color: var(--text-secondary); transition: all 0.14s;
}
.font-item.active { background: var(--pink-50); border-color: var(--pink-300,#f9a8d4); color: var(--pink-700); font-weight: 700; }

/* ══════════════════════════════
   CANVAS CENTRAL
══════════════════════════════ */
.canvas-area {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 28px 20px 20px; gap: 18px;
  background:
    radial-gradient(ellipse at 15% 85%, rgba(244,114,182,0.07) 0%, transparent 55%),
    radial-gradient(ellipse at 85% 10%, rgba(192,57,43,0.05) 0%, transparent 50%),
    var(--bg-main);
  position: relative;
}

.canvas-wrap { position: relative; }

.mockup-shell {
  width: 320px; height: 320px;
  border-radius: var(--radius-xl);
  position: relative;
  box-shadow: var(--shadow-lg);
}

.mockup-inner {
  position: absolute; inset: 0;
  border-radius: var(--radius-xl);
  overflow: hidden;
}
.mockup-bg { position: absolute; inset: 0; border-radius: var(--radius-xl); transition: background 0.3s; }
.mockup-svg {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  pointer-events: none;
}
.print-zone {
  position: absolute;
  border: 2px dashed rgba(236,72,153,0.4);
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.22s; z-index: 5;
  background: rgba(255,240,246,0.08);
}
.print-zone.has-img { border-color: transparent; background: transparent; }
.pz-lbl { font-size: 10px; font-weight: 700; color: rgba(236,72,153,0.6); text-align: center; pointer-events: none; }

/* sticker layer FUERA del overflow:hidden */
.sticker-layer {
  position: absolute; inset: 0;
  z-index: 20; pointer-events: none;
  border-radius: var(--radius-xl);
}
.c-sticker {
  position: absolute; font-size: 30px;
  cursor: grab; user-select: none; z-index: 25;
  pointer-events: all;
  width: 44px; height: 44px; border-radius: 8px;
  border: 2px solid transparent;
  display: flex; align-items: center; justify-content: center;
  transition: border-color 0.12s, background 0.12s;
}
.c-sticker:hover { border-color: var(--pink-400); background: rgba(255,240,246,0.6); }
.c-sticker.sel { border-color: var(--pink-600); background: rgba(255,240,246,0.8); }
.c-sticker:active { cursor: grabbing; }

.c-text {
  position: absolute; font-size: 14px; font-weight: 700;
  color: var(--pink-700); cursor: grab; user-select: none;
  z-index: 25; pointer-events: all;
  padding: 3px 8px; border-radius: 5px;
  border: 2px dashed transparent; white-space: nowrap;
  font-family: 'Nunito', sans-serif; transition: border-color 0.12s;
}
.c-text:hover { border-color: var(--pink-400); background: rgba(255,240,246,0.5); }
.c-text.sel { border-color: var(--pink-600); background: rgba(255,240,246,0.8); }
.c-text:active { cursor: grabbing; }

/* Toolbar flotante */
.toolbar-float {
  display: flex; align-items: center; gap: 2px;
  background: var(--white); border: 1.5px solid var(--border);
  border-radius: 50px; padding: 5px 8px;
  box-shadow: var(--shadow-md); z-index: 50;
}
.tb-btn {
  width: 34px; height: 34px; border-radius: 50%;
  border: none; background: transparent; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: var(--text-secondary); transition: all 0.13s; font-size: 16px;
}
.tb-btn:hover { background: var(--pink-50); color: var(--pink-700); }
.tb-btn.danger:hover { background: #FEECEC; color: #C0392B; }
.tb-sep { width: 1px; height: 20px; background: var(--border); margin: 0 3px; }

/* ══════════════════════════════
   SIDEBAR DCHO
══════════════════════════════ */
.sidebar-right {
  width: 215px; flex-shrink: 0;
  background: var(--white);
  border-left: 1px solid var(--border);
  display: flex; flex-direction: column; overflow: hidden;
}
.rp-scroll {
  flex: 1; overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: var(--pink-200) transparent;
}
.rp-sec { padding: 14px; border-bottom: 1px solid var(--border); }
.rp-lbl {
  font-size: 9px; font-weight: 800;
  letter-spacing: 0.11em; text-transform: uppercase;
  color: var(--text-muted); margin-bottom: 10px;
}

/* Color swatches */
.swatches { display: flex; flex-wrap: wrap; gap: 7px; }
.sw {
  width: 26px; height: 26px; border-radius: 50%;
  cursor: pointer; border: 2.5px solid transparent;
  outline: 2px solid transparent; transition: all 0.14s;
}
.sw:hover { transform: scale(1.13); }
.sw.sel { outline-color: var(--pink-600); outline-offset: 2px; }

/* Sizes */
.size-btns { display: flex; flex-wrap: wrap; gap: 5px; }
.sz-btn {
  padding: 4px 10px; border-radius: var(--radius-sm);
  border: 2px solid var(--border-strong); background: transparent;
  font-family: 'Nunito', sans-serif; font-size: 11px; font-weight: 700;
  cursor: pointer; color: var(--text-secondary); transition: all 0.13s;
}
.sz-btn:hover { border-color: var(--pink-400); color: var(--pink-600); }
.sz-btn.sel { border-color: var(--pink-600); background: var(--pink-50); color: var(--pink-700); }

/* Layers */
.layer-list { display: flex; flex-direction: column; gap: 4px; }
.layer-item {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 9px; border-radius: var(--radius-md);
  border: 2px solid var(--border); cursor: pointer;
  transition: all 0.13s; font-size: 12px; font-weight: 600;
  color: var(--text-secondary); user-select: none;
}
.layer-item:hover { background: var(--gray-50); }
.layer-item.active { background: var(--pink-50); color: var(--pink-700); border-color: var(--pink-200); }
.layer-name { flex: 1; }

/* Sliders */
.slider-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.slider-row label { font-size: 11px; font-weight: 700; color: var(--text-muted); min-width: 54px; }
.slider-row input[type=range] { flex: 1; accent-color: var(--pink-600); }
.slider-val { font-size: 12px; font-weight: 700; color: var(--text-primary); min-width: 34px; text-align: right; }

/* CTA */
.cta-area {
  padding: 15px; background: var(--white);
  border-top: 1px solid var(--border);
}
.price-big {
  font-family: 'Playfair Display', serif;
  font-size: 28px; color: var(--text-primary); line-height: 1;
}
.price-desc { font-size: 11px; font-weight: 600; color: var(--text-muted); margin-top: 4px; margin-bottom: 13px; }
.btn-main {
  width: 100%; padding: 12px; border-radius: var(--radius-md);
  background: var(--pink-600); color: white; border: none;
  font-family: 'Nunito', sans-serif; font-size: 13px; font-weight: 800;
  cursor: pointer; transition: background 0.15s;
  display: flex; align-items: center; justify-content: center; gap: 7px;
  margin-bottom: 7px; letter-spacing: 0.02em;
}
.btn-main:hover { background: var(--pink-700); }
.btn-sec {
  width: 100%; padding: 9px; border-radius: var(--radius-md);
  background: transparent; color: var(--text-secondary);
  border: 2px solid var(--border-strong); font-family: 'Nunito', sans-serif;
  font-size: 12px; font-weight: 700; cursor: pointer;
  transition: background 0.14s;
  display: flex; align-items: center; justify-content: center; gap: 6px;
}
.btn-sec:hover { background: var(--gray-100); }

/* Notif */
.notif {
  position: fixed; bottom: 22px; left: 50%;
  transform: translateX(-50%) translateY(12px);
  background: var(--pink-700); color: white;
  padding: 10px 20px; border-radius: 50px;
  font-size: 13px; font-weight: 700;
  display: flex; align-items: center; gap: 8px;
  opacity: 0; transition: all 0.22s ease;
  pointer-events: none; z-index: 9999;
  white-space: nowrap; box-shadow: var(--shadow-md);
}
.notif.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.notif i { font-size: 14px; color: var(--pink-200); }

/* Watermark de zona */
.zone-watermark {
  position: absolute; bottom: 8px; right: 10px;
  font-size: 9px; font-weight: 700; letter-spacing: 0.08em;
  color: rgba(236,72,153,0.3); text-transform: uppercase; pointer-events: none;
}
</style>
</head>
<body>

<!-- TOPBAR -->
<header class="topbar">
  <a class="logo">
    <div class="logo-hex">
      <!-- flecha Artemis -->
      <svg viewBox="0 0 20 20"><polygon points="4,2 16,10 4,18 7,10"/></svg>
    </div>
    <div>
      <div class="logo-name">Artemis</div>
      <div class="logo-sub">Personalizados &amp; Merchandising</div>
    </div>
  </a>

  <div class="steps">
    <div class="step done"><div class="step-num"><i class="ti ti-check" style="font-size:9px"></i></div> Elegí</div>
    <span class="step-sep">›</span>
    <div class="step active"><div class="step-num">2</div> Diseñá</div>
    <span class="step-sep">›</span>
    <div class="step"><div class="step-num">3</div> Pedí</div>
  </div>

  <div class="topbar-right">
    <div class="badge"><i class="ti ti-sparkles" style="font-size:12px"></i> Editor activo</div>
  </div>
</header>

<div class="workspace">

<!-- ══ SIDEBAR IZQ ══ -->
<aside class="sidebar-left">
  <div class="sb-scroll">

    <div class="sb-sec">
      <div class="sb-lbl">Producto</div>
      <div class="prod-grid" id="prod-grid">
        <!-- se genera por JS -->
      </div>
    </div>

    <div class="sb-sec">
      <div class="sb-lbl">Herramientas</div>
      <div class="tool-list">
        <button class="tool-btn active" onclick="setTool(this,'upload')">
          <i class="ti ti-upload"></i> Subir imagen <span class="tb-dot"></span>
        </button>
        <button class="tool-btn" onclick="setTool(this,'text')">
          <i class="ti ti-letter-t"></i> Agregar texto <span class="tb-dot"></span>
        </button>
        <button class="tool-btn" onclick="setTool(this,'sticker')">
          <i class="ti ti-mood-happy"></i> Stickers <span class="tb-dot"></span>
        </button>
        <button class="tool-btn" onclick="setTool(this,'template')">
          <i class="ti ti-layout-grid"></i> Templates <span class="tb-dot"></span>
        </button>
        <button class="tool-btn" onclick="setTool(this,'filter')">
          <i class="ti ti-adjustments-horizontal"></i> Filtros <span class="tb-dot"></span>
        </button>
      </div>
    </div>

    <div class="sb-sec">
      <div class="sb-lbl" id="tool-lbl">Subir imagen</div>
      <div id="tool-content"></div>
    </div>

  </div>
</aside>

<!-- ══ CANVAS ══ -->

// ── Producto grid ──
function renderProdGrid(){
  const g = document.getElementById('prod-grid');
  g.innerHTML = Object.entries(PRODUCTS).map(([k,p])=>
    `<div class="prod-card${k===ST.prod?' sel':''}" onclick="selectProd(this,'${k}')">
      <i class="ti ${p.icon}"></i><span>${p.label}</span>
    </div>`
  ).join('');
}

function selectProd(el, key){
  document.querySelectorAll('.prod-card').forEach(c=>c.classList.remove('sel'));
  el.classList.add('sel');
  ST.prod = key; ST.size = 0;
  ST.color = PRODUCTS[key].defaultColor;
  clearCanvas();
  renderMockup();
  renderSizes();
  renderSwatches();
  updatePrice();
}

// ── Mockup ──
function renderMockup(){
  const p = PRODUCTS[ST.prod];
  document.getElementById('mockup-bg').style.background = p.bg;
  document.getElementById('mockup-svg').innerHTML = p.svg(ST.color);
  const pz = document.getElementById('print-zone');
  pz.style.width  = p.zone.w+'px';
  pz.style.height = p.zone.h+'px';
  pz.style.top    = p.zone.top+'px';
  pz.style.left   = p.zone.left+'px';
}

// ── Sizes ──
function renderSizes(){
  document.getElementById('size-btns').innerHTML =
    PRODUCTS[ST.prod].sizes.map((s,i)=>
      `<button class="sz-btn${i===ST.size?' sel':''}" onclick="selectSize(this,${i})">${s}</button>`
    ).join('');
}
function selectSize(btn,i){
  ST.size=i;
  document.querySelectorAll('.sz-btn').forEach(b=>b.classList.remove('sel'));
  btn.classList.add('sel');
  updatePrice();
}

// ── Swatches ──
function renderSwatches(){
  const p = PRODUCTS[ST.prod];
  const cols = p.colors.map(c=>({c,n:p.colorNames[c]||c,border:c==='#ffffff'}));
  document.getElementById('swatches').innerHTML = cols.map(({c,n,border})=>
    `<div class="sw${c===ST.color?' sel':''}"
      style="background:${c};${border?'border:2px solid #ddd':''}"
      title="${n}" data-color="${c}" onclick="selectColor(this,'${c}')"></div>`
  ).join('');
}
function selectColor(sw,color){
  ST.color = color;
  document.querySelectorAll('.sw').forEach(s=>s.classList.remove('sel'));
  sw.classList.add('sel');
  renderMockup();
  updatePrice();
}

// ── Price ──
function updatePrice(){
  const p = PRODUCTS[ST.prod];
  const pName = p.label;
  const cName = p.colorNames[ST.color] || 'Personalizado';
  const sName = p.sizes[ST.size];
  document.getElementById('price-big').textContent = '$'+p.price.toLocaleString('es-AR');
  document.getElementById('price-desc').textContent = `${pName} · ${cName} · ${sName}`;
}

function renderToolPanel(tool){
  const lbl = document.getElementById('tool-lbl');
  const box = document.getElementById('tool-content');

  if(tool==='upload'){
    lbl.textContent='Subir imagen';
    box.innerHTML=`

      </div>
      <div class="upload-hint">JPG, PNG, SVG · máx. 20 MB</div>`;

  } else if(tool==='sticker'){
    lbl.textContent='Stickers';
    box.innerHTML=`
      <div class="sticker-cats">${Object.keys(STICKERS).map(k=>
        `<button class="scat${k===ST.scat?' active':''}" onclick="setScat(this,'${k}')">${k}</button>`
      ).join('')}</div>
      <div class="sticker-grid" id="stkr-grid">${renderStickerGrid(ST.scat)}</div>`;

  } else if(tool==='text'){
    lbl.textContent='Texto';
    box.innerHTML=`
      <div class="txt-row">
        <input type="text" id="txt-in" placeholder="Escribí algo...">
        <button onclick="addText()">+</button>
      </div>
      <div class="sb-lbl" style="margin-bottom:8px">Fuente</div>

        <div class="font-item" style="font-family:monospace" onclick="setFont(this,'monospace')">Mono — Técnico</div>
      </div>`;

  } else if(tool==='template'){
    lbl.textContent='Templates';
    box.innerHTML=`<div class="tpl-list">${TEMPLATES.map(t=>
      `<div class="tpl-item" onclick="applyTpl('${t.n}')">
        <div class="tpl-thumb">${t.e}</div>
        <div><div class="tpl-name">${t.n}</div><div class="tpl-desc">${t.d}</div></div>
      </div>`
    ).join('')}</div>`;

  } else if(tool==='filter'){
    lbl.textContent='Filtros';
    const filters=[
      {n:'Sin filtro',   c:'#f5f5f5'},
      {n:'Vintage rosa', c:'#ffe0ec'},

        <div class="flt-sw" style="background:${f.c}"></div>${f.n}
      </button>`
    ).join('')}</div>`;

function addSticker(emoji){
  const layer = document.getElementById('sticker-layer');
  const pz    = document.getElementById('print-zone');

  const el = document.createElement('div');
  el.className = 'c-sticker';
  el.textContent = emoji;
  el.dataset.rot = '0';
  el.dataset.scale = '100';

  const cx = pz.offsetLeft + pz.offsetWidth/2  - 22 + (Math.random()*24-12);
  const cy = pz.offsetTop  + pz.offsetHeight/2 - 22 + (Math.random()*24-12);
  el.style.left = Math.round(cx)+'px';
  el.style.top  = Math.round(cy)+'px';

  makeDraggable(el);
  el.addEventListener('click', e=>{ e.stopPropagation(); selectEl(el); });
  layer.appendChild(el);
  selectEl(el);
  addLayer('sticker', emoji);
  notify(emoji+' sticker agregado','ti-mood-happy');
}

function setFont(el, font){
  ST.currentFont = font;
  document.querySelectorAll('.font-item').forEach(i=>i.classList.remove('active'));
  el.classList.add('active');
}

function addText(){
  const inp = document.getElementById('txt-in');
  const val = (inp?.value||'').trim();
  if(!val){ notify('Escribí algo primero','ti-alert-circle'); return; }

  const layer = document.getElementById('sticker-layer');
  const pz    = document.getElementById('print-zone');

  const el = document.createElement('div');
  el.className = 'c-text';
  el.textContent = val;
  el.style.fontFamily = `'${ST.currentFont}',sans-serif`;
  el.dataset.rot = '0';
  el.dataset.scale = '100';
  el.style.left = (pz.offsetLeft+8)+'px';
  el.style.top  = (pz.offsetTop+pz.offsetHeight/2-10)+'px';

  makeDraggable(el);
  el.addEventListener('click', e=>{ e.stopPropagation(); selectEl(el); });
  layer.appendChild(el);
  selectEl(el);
  addLayer('text', val.substring(0,12)+(val.length>12?'…':''));
  inp.value='';
  notify('Texto agregado','ti-letter-t');
}

// ── Selection ──
function selectEl(el){
  if(selEl){ selEl.classList.remove('sel'); }
  selEl = el;
  el.classList.add('sel');
  // sync sliders
  document.getElementById('sl-opacity').value = el.dataset.opacity||100;
  document.getElementById('v-opacity').textContent = (el.dataset.opacity||100)+'%';
  document.getElementById('sl-scale').value = el.dataset.scale||100;
  document.getElementById('v-scale').textContent = (el.dataset.scale||100)+'%';
  document.getElementById('sl-rotate').value = el.dataset.rot||0;
  document.getElementById('v-rotate').textContent = (el.dataset.rot||0)+'°';
}

document.addEventListener('click', e=>{
  if(selEl && !selEl.contains(e.target)){
    selEl.classList.remove('sel');
    selEl = null;
  }
});

function removeSelected(){
  if(selEl){ selEl.remove(); selEl=null; notify('Elemento eliminado','ti-trash'); }
  else notify('Seleccioná un elemento primero','ti-alert-circle');
}

function centerSelected(){
  if(!selEl){ notify('Seleccioná un elemento primero','ti-alert-circle'); return; }
  const pz = document.getElementById('print-zone');
  const ew = selEl.offsetWidth  || 44;
  const eh = selEl.offsetHeight || 44;
  selEl.style.left = (pz.offsetLeft + pz.offsetWidth/2  - ew/2)+'px';
  selEl.style.top  = (pz.offsetTop  + pz.offsetHeight/2 - eh/2)+'px';
  notify('Elemento centrado','ti-focus-centered');
}

function duplicateSelected(){
  if(!selEl){ notify('Seleccioná un elemento primero','ti-alert-circle'); return; }
  const clone = selEl.cloneNode(true);
  clone.style.left = (parseInt(selEl.style.left)||0)+14+'px';
  clone.style.top  = (parseInt(selEl.style.top) ||0)+14+'px';
  clone.classList.remove('sel');
  makeDraggable(clone);
  clone.addEventListener('click', e=>{ e.stopPropagation(); selectEl(clone); });
  selEl.parentElement.appendChild(clone);
  selectEl(clone);
  notify('Elemento duplicado','ti-copy');
}

function rotateSelected(){
  if(!selEl){ notify('Seleccioná un elemento primero','ti-alert-circle'); return; }
  const cur = parseInt(selEl.dataset.rot||0);
  const next = (cur+45)%360;
  selEl.dataset.rot = next;
  applyTransform(selEl);
  document.getElementById('sl-rotate').value = next;
  document.getElementById('v-rotate').textContent = next+'°';
}

// ── Sliders ──
function applyOpacity(v){
  if(!selEl) return;
  selEl.style.opacity = v/100;
  selEl.dataset.opacity = v;
}
function applyScale(v){
  if(!selEl) return;
  selEl.dataset.scale = v;
  applyTransform(selEl);
}
function applyRotate(v){
  if(!selEl) return;
  selEl.dataset.rot = v;
  applyTransform(selEl);
}
function applyTransform(el){
  const s = el.dataset.scale||100;
  const r = el.dataset.rot||0;
  el.style.transform = `scale(${s/100}) rotate(${r}deg)`;
}

// ── Draggable ──
function makeDraggable(el){
  let sx,sy,sl,st,drag=false;
  el.addEventListener('mousedown', e=>{
    e.stopPropagation();
    drag=true; sx=e.clientX; sy=e.clientY;
    sl=parseInt(el.style.left)||0; st=parseInt(el.style.top)||0;
    el.style.cursor='grabbing';
    document.body.style.userSelect='none';
  });
  document.addEventListener('mousemove', e=>{
    if(!drag) return;
    el.style.left=(sl+e.clientX-sx)+'px';
    el.style.top =(st+e.clientY-sy)+'px';
  });
  document.addEventListener('mouseup', ()=>{
    if(!drag) return; drag=false;
    el.style.cursor='grab';
    document.body.style.userSelect='';
  });
  // touch
  el.addEventListener('touchstart', e=>{
    const t=e.touches[0];
    drag=true; sx=t.clientX; sy=t.clientY;
    sl=parseInt(el.style.left)||0; st=parseInt(el.style.top)||0;
  },{passive:true});
  document.addEventListener('touchmove', e=>{
    if(!drag) return;
    const t=e.touches[0];
    el.style.left=(sl+t.clientX-sx)+'px';
    el.style.top =(st+t.clientY-sy)+'px';
  },{passive:true});
  document.addEventListener('touchend',()=>{ drag=false; });
}

// ── Layers ──
function addLayer(type, label){
  const list = document.getElementById('layer-list');
  const icon = type==='sticker'?'ti-mood-happy':'ti-letter-t';
  const item = document.createElement('div');
  item.className='layer-item';
  item.innerHTML=`<i class="ti ${icon}" style="font-size:15px"></i>
    <span class="layer-name">${label}</span>
    <i class="ti ti-eye" style="font-size:13px;color:var(--text-muted)"></i>`;
  list.appendChild(item);
}

function clearCanvas(){
  document.getElementById('sticker-layer').innerHTML='';
  const pz = document.getElementById('print-zone');
  pz.classList.remove('has-img');
  pz.innerHTML='<div class="pz-lbl" id="pz-lbl">Zona de impresión</div>';
  document.getElementById('layer-list').innerHTML=`
    <div class="layer-item active">
      <i class="ti ti-photo" style="font-size:15px"></i>
      <span class="layer-name">Imagen base</span>
      <i class="ti ti-eye" style="font-size:13px;color:var(--text-muted)"></i>
    </div>`;
  selEl=null;
}

// ── Misc ──
function applyTpl(name){ notify('Template "'+name+'" aplicado','ti-layout-grid'); }
function applyFilter(btn,name){
  document.querySelectorAll('.flt-item').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  notify('Filtro "'+name+'" aplicado','ti-adjustments-horizontal');
}

// ── Notificación ──
let notifT;
function notify(msg, icon='ti-check'){
  clearTimeout(notifT);
  document.getElementById('notif-icon').className='ti '+icon;
  document.getElementById('notif-txt').textContent=msg;
  const n=document.getElementById('notif');
  n.classList.add('show');
  notifT=setTimeout(()=>n.classList.remove('show'),2500);
}
</script>
